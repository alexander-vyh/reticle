name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Create config stubs for tests
        run: |
          mkdir -p ~/.reticle/config
          echo '{"slackBotToken":"xoxb-test","slackUserId":"UTEST","gmailAccount":"test@test.com"}' > ~/.reticle/config/secrets.json
          echo '{"reports":[],"filterPatterns":{"companyDomain":"testcorp.com","dwGroupEmail":"digitalworkplace@testcorp.com"}}' > ~/.reticle/config/team.json

      - name: Run tests
        run: npm test

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
